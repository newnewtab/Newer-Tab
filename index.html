<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>New Tab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script async
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7762107676364310"
crossorigin="anonymous"></script>

<style>
:root {
  --nav-height: 56px;
  --bg: #0f172a;
  --bg-2: #111827;
  --border: #1f2937;
  --text: #e5e7eb;
  --muted: #9ca3af;
  --accent: #38bdf8;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* NAV */
nav {
  position: fixed;
  inset: 0 0 auto 0;
  height: var(--nav-height);
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 18px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  z-index: 1000;
}

.title { font-weight: 800; font-size: 20px; }

.tabs {
  display: flex;
  gap: 6px;
  flex: 1;
  align-items: center;
}

.tab {
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
}

.tab:hover { background: var(--bg-2); }

#viewer {
  position: fixed;
  top: var(--nav-height);
  left: 0;
  width: 100%;
  height: calc(100% - var(--nav-height));
  border: none;
  background: black;
}

/* POPUP */
.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}

.popup-box {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 380px;
  text-align: center;
}

.popup-title {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 10px;
}

.popup-text {
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 14px;
}

.url-box {
  margin: 12px 0 18px;
  padding: 10px;
  border-radius: 10px;
  background: #0b1220;
  border: 1px solid var(--border);
  word-break: break-all;
  font-size: 13px;
  color: #93c5fd;
}

.popup-buttons {
  display: flex;
  gap: 10px;
  justify-content: center;
}

.btn {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: var(--bg);
  color: var(--text);
}

.btn.primary {
  background: var(--accent);
  color: #000;
  font-weight: 700;
}

.btn:disabled {
  opacity: .5;
  cursor: not-allowed;
}

.copied {
  margin-top: 10px;
  font-size: 13px;
  color: var(--accent);
  min-height: 18px;
}
</style>
</head>

<body>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">

    <div class="popup-title">Enable Email Notifications</div>

    <div class="popup-text">
      If this site gets blocked, you'll get the new URL automatically.
    </div>

    <div class="url-box">
      https://forms.gle/TUeMfjBxiSW6xQru9
    </div>

    <div class="popup-buttons">
      <button id="enableBtn" class="btn primary">Copy Link</button>
      <button id="skipBtn" class="btn" disabled>Skip (20)</button>
    </div>

    <div id="copiedMsg" class="copied"></div>

  </div>
</div>

<!-- NAV -->
<nav>
  <div class="title">New Tab 2</div>
  <div class="tabs" id="tabs"></div>
</nav>

<iframe id="viewer"></iframe>

<script src="games.js"></script>

<script>
const tabs = document.getElementById("tabs");
const iframe = document.getElementById("viewer");

function loadGame(name, url) {
  iframe.src = url;
}

function build() {
  tabs.innerHTML = "";
  Object.entries(PAGES).forEach(([name, url]) => {
    const tab = document.createElement("div");
    tab.className = "tab";
    tab.textContent = name;
    tab.onclick = () => loadGame(name, url);
    tabs.appendChild(tab);
  });
}
build();

/* =========================
   POPUP LOGIC
========================= */

const popup = document.getElementById("popup");
const enableBtn = document.getElementById("enableBtn");
const skipBtn = document.getElementById("skipBtn");
const copiedMsg = document.getElementById("copiedMsg");

const FORM_LINK = "https://forms.gle/TUeMfjBxiSW6xQru9";
const POPUP_KEY = "email_popup_seen_v1";

/* SHOW ONLY ON FIRST VISIT */
if (localStorage.getItem(POPUP_KEY) === "true") {
  popup.style.display = "none";
} else {
  popup.style.display = "flex";
}

/* COPY BUTTON */
enableBtn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(FORM_LINK);
    copiedMsg.textContent = "Copied to clipboard!";
  } catch {
    copiedMsg.textContent = "Copy failed — use the link above.";
  }

  setTimeout(() => copiedMsg.textContent = "", 2500);
});

/* TIMER */
let time = 20;

const updateButton = () => {
  if (time > 0) {
    skipBtn.textContent = `Close (${time})`;
  } else {
    skipBtn.textContent = "Close";
    skipBtn.disabled = false;
    clearInterval(timer);
  }
};

updateButton();

const timer = setInterval(() => {
  time--;
  updateButton();
}, 1000);

/* CLOSE + SAVE (ONLY ON SKIP) */
skipBtn.addEventListener("click", () => {
  popup.style.display = "none";
  localStorage.setItem(POPUP_KEY, "true");
});
</script>

</body>
</html>
