<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>New Tab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script async
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7762107676364310"
crossorigin="anonymous"></script>

<style>
:root {
  --nav-height: 56px;
  --bg: #0f172a;
  --bg-2: #111827;
  --border: #1f2937;
  --text: #ffffff;
  --muted: #9ca3af;
  --accent: #38bdf8;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* NAV */
nav {
  position: fixed;
  inset: 0 0 auto 0;
  height: var(--nav-height);
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 18px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  z-index: 1000;
}

.title { font-weight: 800; font-size: 20px; }

.tabs {
  display: flex;
  gap: 6px;
  flex: 1;
  align-items: center;
}

.tab {
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
}

.tab:hover { background: var(--bg-2); }

#viewer {
  position: fixed;
  top: var(--nav-height);
  left: 0;
  width: 100%;
  height: calc(100% - var(--nav-height));
  border: none;
  background: black;
}

/* FULLSCREEN OVERLAY POPUP */
.overlay {
  position: fixed;
  inset: 0;
  background: #000000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 20px;
  text-align: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.5s ease, visibility 0.5s;
}

.overlay.active {
  opacity: 1;
  visibility: visible;
}

.overlay-content {
  max-width: 700px;
  transform: translateY(20px);
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.overlay.active .overlay-content {
  transform: translateY(0);
}

.overlay-title {
  font-size: clamp(24px, 5vw, 42px);
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 40px;
  color: #ffffff;
}

.overlay-btns {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-choice {
  padding: 16px 48px;
  font-size: 18px;
  font-weight: 600;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-yes {
  background: #ffffff;
  color: #000000;
}

.btn-yes:hover {
  background: #e2e2e2;
  transform: scale(1.05);
}

.btn-no {
  background: transparent;
  border: 2px solid #333;
  color: #666;
}

.btn-no:not(:disabled):hover {
  border-color: #fff;
  color: #fff;
}

.btn-no:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

</style>
</head>

<body>

<!-- FULLSCREEN POPUP -->
<div id="emailPopup" class="overlay">
  <div class="overlay-content">
    <div class="overlay-title">Would you like to be emailed the new URL when this site is blocked?</div>
    
    <div class="overlay-btns">
      <button id="yesBtn" class="btn-choice btn-yes">Yes</button>
      <button id="noBtn" class="btn-choice btn-no" disabled>No (5)</button>
    </div>
  </div>
</div>

<!-- NAV -->
<nav>
  <div class="title">New Tab 2</div>
  <div class="tabs" id="tabs"></div>
</nav>

<iframe id="viewer"></iframe>

<script src="games.js"></script>

<script>
/* TAB LOADING LOGIC */
const tabs = document.getElementById("tabs");
const iframe = document.getElementById("viewer");

function loadGame(name, url) {
  iframe.src = url;
}

function build() {
  tabs.innerHTML = "";
  // Check if PAGES exists from games.js
  if(typeof PAGES !== 'undefined'){
    Object.entries(PAGES).forEach(([name, url]) => {
      const tab = document.createElement("div");
      tab.className = "tab";
      tab.textContent = name;
      tab.onclick = () => loadGame(name, url);
      tabs.appendChild(tab);
    });
  }
}
build();

/* =========================
   NEW POPUP LOGIC
========================= */

const emailPopup = document.getElementById("emailPopup");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

const FORM_LINK = "https://forms.gle/TUeMfjBxiSW6xQru9";
const STORAGE_KEY = "email_prompt_dismissed";

// Check local storage
if (!localStorage.getItem(STORAGE_KEY)) {
  // Show with small delay for animation effect
  setTimeout(() => {
    emailPopup.classList.add('active');
    startNoTimer();
  }, 100);
}

function hideAndSave() {
  emailPopup.classList.remove('active');
  localStorage.setItem(STORAGE_KEY, "true");
  // Remove from DOM after transition to allow clicks underneath
  setTimeout(() => emailPopup.style.display = "none", 500);
}

// YES Button
yesBtn.addEventListener("click", () => {
  window.open(FORM_LINK, '_blank');
  hideAndSave();
});

// NO Button
noBtn.addEventListener("click", () => {
  hideAndSave();
});

// Timer for NO button
function startNoTimer() {
  let timeLeft = 5;
  const timerInterval = setInterval(() => {
    timeLeft--;
    if (timeLeft > 0) {
      noBtn.textContent = `No (${timeLeft})`;
    } else {
      noBtn.textContent = "No";
      noBtn.disabled = false;
      clearInterval(timerInterval);
    }
  }, 1000);
}
</script>

</body>
</html>
